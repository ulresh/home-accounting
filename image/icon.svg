<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Набросок иконки «ДомУчёт»: домик + тетрадка. Просто эскиз для просмотра. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7E68C8"/>
      <stop offset="1" stop-color="#5B45A0"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E8624A"/>
      <stop offset="1" stop-color="#C8432F"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F1EEF8"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.20"/>
    </filter>
  </defs>

  <!-- фон-плашка (squircle) -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="url(#bg)"/>

  <!-- ТЕТРАДКА: лежит как основа, слегка наклонена -->
  <g transform="rotate(-7 256 318)" filter="url(#soft)">
    <!-- обложка под страницей -->
    <rect x="96" y="196" width="320" height="250" rx="20" fill="#3C2F6E"/>
    <!-- страница -->
    <rect x="112" y="186" width="320" height="250" rx="18" fill="url(#page)"/>
    <!-- красное поле -->
    <line x1="168" y1="196" x2="168" y2="426" stroke="#E8624A" stroke-width="4" opacity="0.8"/>
    <!-- линии в линейку -->
    <g stroke="#9AA7C7" stroke-width="4" opacity="0.55" stroke-linecap="round">
      <line x1="190" y1="330" x2="404" y2="330"/>
      <line x1="190" y1="360" x2="404" y2="360"/>
      <line x1="190" y1="390" x2="404" y2="390"/>
    </g>
    <!-- спираль-пружина сверху -->
    <g stroke="#C9B7F2" stroke-width="9" stroke-linecap="round">
      <line x1="150" y1="178" x2="150" y2="206"/>
      <line x1="198" y1="178" x2="198" y2="206"/>
      <line x1="246" y1="178" x2="246" y2="206"/>
      <line x1="294" y1="178" x2="294" y2="206"/>
      <line x1="342" y1="178" x2="342" y2="206"/>
      <line x1="390" y1="178" x2="390" y2="206"/>
    </g>
  </g>

  <!-- ДОМИК: стоит впереди по центру -->
  <g filter="url(#soft)">
    <!-- крыша -->
    <path d="M256 96 L408 224 L104 224 Z" fill="url(#roof)"/>
    <!-- свес крыши -->
    <path d="M256 96 L408 224 L104 224 Z" fill="none" stroke="#A8351F" stroke-width="6" stroke-linejoin="round"/>
    <!-- труба -->
    <rect x="330" y="120" width="34" height="60" rx="6" fill="#C8432F"/>
    <!-- стена -->
    <rect x="138" y="224" width="236" height="180" rx="10" fill="#FBF8FF"/>
    <rect x="138" y="224" width="236" height="180" rx="10" fill="none" stroke="#6750A4" stroke-width="5"/>
    <!-- окно -->
    <rect x="170" y="256" width="78" height="78" rx="8" fill="#BFD2F2" stroke="#6750A4" stroke-width="5"/>
    <line x1="209" y1="256" x2="209" y2="334" stroke="#6750A4" stroke-width="5"/>
    <line x1="170" y1="295" x2="248" y2="295" stroke="#6750A4" stroke-width="5"/>
    <!-- дверь -->
    <rect x="282" y="300" width="66" height="104" rx="8" fill="#7E68C8" stroke="#4E3C8C" stroke-width="5"/>
    <circle cx="296" cy="354" r="5" fill="#FBF8FF"/>
  </g>
</svg>
